<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify — Historial 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: #0a0a0f; color: #e8e8f0; font-family: 'Courier New', monospace; }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #1a0a2e 0%, #0d1117 60%, #0a1628 100%);
      border-bottom: 1px solid #1e1e3a;
      padding: 28px 24px 20px;
      position: sticky; top: 0; z-index: 10;
    }
    .header-inner { max-width: 800px; margin: 0 auto; }
    .header-tag { display: flex; align-items: baseline; gap: 12px; margin-bottom: 4px; }
    .tag-spotify { font-size: 11px; letter-spacing: 4px; color: #1db954; text-transform: uppercase; }
    .tag-years   { font-size: 11px; letter-spacing: 2px; color: #555; }
    h1 { font-size: 24px; font-weight: 800; letter-spacing: -1px; color: #fff; margin-bottom: 16px; }

    /* TABS */
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
    .tab {
      background: transparent; border: 1px solid #2a2a4a; border-radius: 6px;
      color: #666; padding: 6px 14px; font-size: 12px; font-family: inherit;
      cursor: pointer; transition: all 0.15s; letter-spacing: 1px;
    }
    .tab.active { background: #1db954; border-color: #1db954; color: #000; font-weight: 700; }

    /* CONTROLS */
    .controls { display: flex; gap: 10px; flex-wrap: wrap; }
    input, select {
      background: #111; border: 1px solid #2a2a4a; border-radius: 6px;
      color: #e8e8f0; padding: 8px 12px; font-size: 13px; font-family: inherit; outline: none;
    }
    input { flex: 1 1 160px; }
    select { cursor: pointer; }
    .subtitle { margin-top: 10px; font-size: 11px; color: #444; letter-spacing: 1px; }

    /* LEGEND */
    .legend { max-width: 800px; margin: 14px auto 0; padding: 0 24px; display: flex; gap: 12px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
    .legend-label { font-size: 11px; color: #666; letter-spacing: 1px; }

    /* LIST */
    #list { max-width: 800px; margin: 12px auto 40px; padding: 0 24px; }

    .row { border: 1px solid transparent; border-radius: 8px; margin-bottom: 2px; cursor: pointer; transition: background 0.12s, border-color 0.12s; }
    .row:hover { background: #0e0e1a; }
    .row.open { background: #111827; border-color: #1e293b; }

    .row-main { display: flex; align-items: center; gap: 12px; padding: 10px 12px; }
    .rank { font-size: 10px; width: 28px; text-align: right; flex-shrink: 0; color: #333; }
    .rank.top { color: #1db954; }
    .name-area { flex: 1; min-width: 0; }
    .artist-name { font-size: 14px; font-weight: 600; color: #d4d4e8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
    .row.open .artist-name { color: #fff; }
    .bar-wrap { height: 4px; border-radius: 2px; background: #1a1a2e; display: flex; overflow: hidden; }
    .stats { text-align: right; flex-shrink: 0; }
    .plays { font-size: 15px; font-weight: 700; color: #fff; }
    .time  { font-size: 10px; color: #444; letter-spacing: 0.5px; }
    .chevron { color: #333; font-size: 10px; flex-shrink: 0; }

    .detail { display: none; padding: 0 12px 14px 52px; flex-direction: column; gap: 7px; }
    .row.open .detail { display: flex; }
    .detail-row { display: flex; align-items: center; gap: 10px; }
    .detail-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .detail-year { font-size: 12px; color: #888; width: 36px; }
    .detail-bar-wrap { flex: 1; height: 3px; border-radius: 2px; background: #1a1a2e; overflow: hidden; }
    .detail-bar { height: 100%; opacity: 0.75; }
    .detail-plays { font-size: 12px; color: #ccc; width: 64px; text-align: right; }
    .detail-mins  { font-size: 11px; color: #555; width: 56px; text-align: right; }

    /* STATS PAGE */
    #stats-page { max-width: 800px; margin: 20px auto 40px; padding: 0 24px; display: none; }
    .stat-section { margin-bottom: 32px; }
    .stat-title { font-size: 11px; letter-spacing: 3px; color: #1db954; text-transform: uppercase; margin-bottom: 16px; }

    .year-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .year-card {
      background: #0e0e1a; border: 1px solid #1e1e3a; border-radius: 8px; padding: 14px;
    }
    .year-card .yc-year { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .year-card .yc-hrs  { font-size: 28px; font-weight: 900; color: #1db954; line-height: 1; margin-bottom: 2px; }
    .year-card .yc-unit { font-size: 11px; color: #555; letter-spacing: 1px; }
    .year-card .yc-plays { font-size: 12px; color: #666; margin-top: 6px; }

    /* BAR CHART */
    .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 120px; }
    .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; }
    .bar-fill { width: 100%; border-radius: 3px 3px 0 0; min-height: 4px; }
    .bar-label { font-size: 10px; color: #555; margin-top: 5px; letter-spacing: 0.5px; }
    .bar-val { font-size: 10px; color: #888; margin-bottom: 3px; }

    /* TOP TRACKS */
    .track-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #111; }
    .track-rank { font-size: 11px; color: #333; width: 24px; text-align: right; flex-shrink: 0; }
    .track-rank.top { color: #1db954; }
    .track-info { flex: 1; min-width: 0; }
    .track-name { font-size: 13px; font-weight: 600; color: #d4d4e8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist { font-size: 11px; color: #555; }
    .track-plays { font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }

    .empty { text-align: center; color: #333; padding: 60px 0; font-size: 13px; letter-spacing: 1px; }

    /* SPLASH */
    #splash {
      position: fixed; inset: 0; z-index: 100;
      background: #0a0a0f;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 24px; cursor: pointer;
      transition: opacity 0.6s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash img {
      width: 220px; height: 220px; object-fit: cover;
      border-radius: 16px;
      box-shadow: 0 0 60px rgba(29,185,84,0.3);
    }
    #splash .splash-title {
      font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px;
    }
    #splash .splash-sub {
      font-size: 12px; color: #555; letter-spacing: 3px; text-transform: uppercase;
    }
    #splash .splash-btn {
      margin-top: 8px;
      background: #1db954; color: #000; font-weight: 700;
      border: none; border-radius: 50px; padding: 12px 36px;
      font-size: 14px; cursor: pointer; letter-spacing: 1px;
      font-family: inherit;
    }
  </style>
</head>
<body>

<div id="splash" onclick="closeSplash()">

  <div class="splash-title">Mi historial de Spotify</div>

          <option value="minutes">Ordenar: minutos</option>
        </select>
      </div>
      <div class="subtitle" id="subtitle"></div>
    </div>
  </div>
</header>

<div class="legend" id="legend-bar"></div>
<div id="list"></div>
<div id="stats-page"></div>

let openArtist = null;
let currentTab = 'artists';

function fmtTime(mins) {
  if (mins >= 60) return `${Math.floor(mins/60)}h ${mins%60}m`;
  return `${mins}m`;
}

// BUILD LEGEND
function buildLegend() {
  const leg = document.getElementById('legend-bar');
  leg.innerHTML = ALL_YEARS.map(y =>
    `<div class="legend-item">
      <div class="legend-dot" style="background:${YEAR_COLORS[y]}"></div>
      <span class="legend-label">${y}</span>
    </div>`
  ).join('');
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='artists')||(i===1&&tab==='stats')));
  document.getElementById('artist-controls').style.display = tab==='artists' ? '' : 'none';
  document.getElementById('legend-bar').style.display = tab==='artists' ? '' : 'none';
  document.getElementById('list').style.display = tab==='artists' ? '' : 'none';
  document.getElementById('stats-page').style.display = tab==='stats' ? '' : 'none';
  if (tab==='stats') renderStats();
}

function renderArtists() {
  const search = document.getElementById('search').value.toLowerCase();
  const year   = document.getElementById('yearFilter').value;
  const sortBy = document.getElementById('sortBy').value;

  let list = ARTISTS.filter(a => {
    if (search && !a.artist.toLowerCase().includes(search)) return false;
    if (year !== 'all' && !a.years[year]) return false;
    return true;
  });

  if (sortBy === 'minutes') {
    list = [...list].sort((a,b) => {
      const ma = Object.values(a.years).reduce((s,v)=>s+v.minutes,0);
      const mb = Object.values(b.years).reduce((s,v)=>s+v.minutes,0);
      return mb - ma;
    });
  }

  document.getElementById('subtitle').textContent =
    `${list.length} de ${TOTAL_ARTISTS} artistas · ${TOTAL_PLAYS.toLocaleString()} reproducciones totales`;

  const container = document.getElementById('list');
  if (list.length === 0) { container.innerHTML = '<div class="empty">No se encontraron artistas</div>'; return; }

  container.innerHTML = list.map((a, i) => {
    const totalMins = Object.values(a.years).reduce((s,v)=>s+v.minutes,0);
    const barWidth  = Math.max((a.total / MAX_PLAYS * 100), 0.5).toFixed(1);
    const isOpen    = openArtist === a.artist;

    const segments = Object.entries(a.years).map(([y,v]) =>
      `<div style="flex:${v.plays};background:${YEAR_COLORS[y]};opacity:.85"></div>`
    ).join('');

    const details = Object.entries(a.years).map(([y,v]) => {
      const pct = (v.plays / a.total * 100).toFixed(1);
      return `<div class="detail-row">
        <div class="detail-dot" style="background:${YEAR_COLORS[y]}"></div>
        <span class="detail-year">${y}</span>
        <div class="detail-bar-wrap"><div class="detail-bar" style="width:${pct}%;background:${YEAR_COLORS[y]}"></div></div>
        <span class="detail-plays">${v.plays.toLocaleString()} ▶</span>
        <span class="detail-mins">${fmtTime(v.minutes)}</span>
      </div>`;
    }).join('');

    return `<div class="row${isOpen?' open':''}" onclick="toggle('${a.artist.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
      <div class="row-main">
        <span class="rank${i<3?' top':''}">${i+1}</span>
        <div class="name-area">
          <div class="artist-name">${a.artist}</div>
          <div class="bar-wrap" style="width:${barWidth}%;min-width:4px">${segments}</div>
        </div>
        <div class="stats">
          <div class="plays">${a.total.toLocaleString()}</div>
          <div class="time">${Math.round(totalMins/60)}h ${Math.round(totalMins%60)}m</div>
        </div>
        <span class="chevron">${isOpen?'▲':'▼'}</span>
      </div>
      <div class="detail">${details}</div>
    </div>`;
  }).join('');
}

function renderStats() {
  const maxHrs = Math.max(...Object.values(YEAR_DATA).map(d=>d.hrs));

  const yearCards = ALL_YEARS.map(y => {
    const d = YEAR_DATA[y];
    return `<div class="year-card">
      <div class="yc-year">${y}</div>
      <div class="yc-hrs">${d.hrs.toFixed(0)}</div>
      <div class="yc-unit">horas</div>
      <div class="yc-plays">${d.plays.toLocaleString()} reproducciones</div>
    </div>`;
  }).join('');

  const barCols = ALL_YEARS.map(y => {
    const d = YEAR_DATA[y];
    const pct = (d.hrs / maxHrs * 100).toFixed(1);
    return `<div class="bar-col">
      <div class="bar-val" style="color:${YEAR_COLORS[y]};font-size:9px">${d.hrs>=100?Math.round(d.hrs):d.hrs.toFixed(0)}h</div>
      <div class="bar-fill" style="height:${pct}%;background:${YEAR_COLORS[y]};opacity:.8"></div>
      <div class="bar-label" style="color:${YEAR_COLORS[y]}">${y.slice(2)}</div>
    </div>`;
  }).join('');

  const trackRows = TOP_TRACKS.map((t,i) =>
    `<div class="track-row">
      <span class="track-rank${i<3?' top':''}">${i+1}</span>
      <div class="track-info">
        <div class="track-name">${t.track}</div>
        <div class="track-artist">${t.artist}</div>
      </div>
      <span class="track-plays">${t.plays}×</span>
    </div>`
  ).join('');

  document.getElementById('stats-page').innerHTML = `
    <div class="stat-section">
      <div class="stat-title">Horas escuchadas por año</div>
      <div class="bar-chart" style="margin-bottom:24px">${barCols}</div>
      <div class="year-grid">${yearCards}</div>
    </div>
    <div class="stat-section">
      <div class="stat-title">Top 20 canciones más escuchadas</div>
      ${trackRows}
    </div>
    <div class="stat-section">
      <div style="display:flex;gap:24px;flex-wrap:wrap">
        <div>
          <div class="stat-title">Total reproducciones</div>
          <div style="font-size:36px;font-weight:900;color:#1db954">${TOTAL_PLAYS.toLocaleString()}</div>
        </div>
        <div>
          <div class="stat-title">Artistas únicos</div>
          <div style="font-size:36px;font-weight:900;color:#3b82f6">${TOTAL_ARTISTS}</div>
        </div>
        <div>
          <div class="stat-title">Total horas</div>
          <div style="font-size:36px;font-weight:900;color:#a855f7">${Math.round(Object.values(YEAR_DATA).reduce((s,d)=>s+d.hrs,0)).toLocaleString()}</div>
        </div>
      </div>
    </div>`;
}

function toggle(artist) {
  openArtist = openArtist === artist ? null : artist;
  renderArtists();
}

buildLegend();
renderArtists();
</script>
</body>
</html>
